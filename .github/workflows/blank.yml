- name: Build OpenWrt Image
        run: |
          cd ib
          # Kita pastikan ukuran partisi diatur ulang tepat sebelum eksekusi
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=512/g' .config
          make image PROFILE="generic" PACKAGES="$PACKAGES" FILES="files"

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          # Mencari semua file image di dalam folder bin secara rekursif
          find ib/bin/targets/armsr/armv8/ -type f \( -name "*.img*" -o -name "*.tar.gz" \) -exec cp {} output/ \;
          
          # List file yang ditemukan untuk pengecekan di log
          ls -R output/
          
          # Ekstrak jika ada file .gz agar BalenaEtcher bisa langsung pakai
          cd output
          for f in *.gz; do [ -f "$f" ] && gunzip "$f"; done || true

      - name: Upload Flashable Image
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_HG680FJ_Result
          # Gunakan path yang lebih luas agar pasti terangkat
          path: output/*
