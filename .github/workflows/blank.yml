name: Build OpenWrt HG680FJ Custom Final

on:
  workflow_dispatch:

env:
  KERNEL_URL: https://github.com/ophub/kernel/releases/download/kernel_stable/6.18.23.tar.gz
  ROOTFS_URL: https://downloads.openwrt.org/releases/25.12.2/targets/armsr/armv8/openwrt-25.12.2-armsr-armv8-rootfs.tar.gz
  DTB_NAME: meson-gxl-s905x-p212.dtb

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl tar zstd

      - name: Prepare Workspace
        run: |
          sudo mkdir -pv build/boot build/rootfs_data output/boot output/rootfs
          curl -L ${{ env.ROOTFS_URL }} -o rootfs.tar.gz
          curl -L ${{ env.KERNEL_URL }} -o kernel_bundle.tar.gz

      - name: Extract and Patch System
        run: |
          # 1. Ekstrak Rootfs
          sudo tar -xzvf rootfs.tar.gz -C build/rootfs_data
          
          # 2. Ekstrak Kernel Bundle
          mkdir -p kernel_raw
          tar -xzvf kernel_bundle.tar.gz -C kernel_raw
          
          # 3. Ekstrak Sub-Paket Kernel (Struktur Berlapis)
          mkdir -p unpacked
          tar -xzvf kernel_raw/6.18.23/boot-6.18.23-ophub.tar.gz -C unpacked/ || true
          tar -xzvf kernel_raw/6.18.23/modules-6.18.23-ophub.tar.gz -C unpacked/ || true
          tar -xzvf kernel_raw/6.18.23/dtb-amlogic-6.18.23-ophub.tar.gz -C unpacked/ || true
          
          # 4. Salin Kernel & DTB
          # Cari file kernel dan DTB secara dinamis
          KRN_SRC=$(find unpacked -name "vmlinuz*" | head -n 1)
          DTB_SRC=$(find unpacked -name "${{ env.DTB_NAME }}" | head -n 1)
          
          sudo cp -v "$KRN_SRC" build/boot/vmlinuz
          sudo cp -v "$DTB_SRC" build/boot/dtb.img
          
          # 5. Salin Modules (Sangat Krusial)
          MOD_SRC=$(find unpacked -type d -path "*/lib/modules" | head -n 1)
          if [ -d "$MOD_SRC" ]; then
            sudo mkdir -pv build/rootfs_data/lib/modules
            sudo cp -rv "$MOD_SRC"/* build/rootfs_data/lib/modules/
          else
            echo "ERROR: Folder modules tidak ditemukan!" && exit 1
          fi
          
          # 6. Konfigurasi Boot (uEnv.txt)
          cat <<EOF | sudo tee build/boot/uEnv.txt
          LINUX=/vmlinuz
          FDT=/dtb.img
          APPEND=root=PARTUUID=eb095049-02 rootwait console=ttyAML0,115200 console=tty1 selinux=0
          EOF

      - name: Packaging Artifacts
        run: |
          # Salin hasil boot
          sudo cp -rv build/boot/* output/boot/
          # Kompres Rootfs yang sudah di-patch
          cd build/rootfs_data && sudo tar -czvf ../../output/rootfs/rootfs-patched.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-HG680FJ-Final
          path: output/
