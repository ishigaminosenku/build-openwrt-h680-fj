name: Build OpenWrt HG680FJ Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04 # Gunakan versi terbaru agar support zstd secara native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl tar zstd

      - name: Download Components
        run: |
          mkdir -p build/boot build/rootfs_data
          
          # 1. Download Rootfs OpenWrt 25.12.2
          curl -L https://downloads.openwrt.org/releases/25.12.2/targets/armsr/armv8/openwrt-25.12.2-armsr-armv8-rootfs.tar.gz -o rootfs.tar.gz
          
          # 2. Download Kernel Ophub 6.18.23
          curl -L https://github.com/ophub/kernel/releases/download/kernel_stable/6.18.23.tar.gz -o kernel.tar.gz

      - name: Extract and Patch
        run: |
          # Ekstrak Rootfs
          sudo tar -xzvf rootfs.tar.gz -C build/rootfs_data
          
          # Ekstrak Kernel
          mkdir kernel_tmp
          tar -xzvf kernel.tar.gz -C kernel_tmp
          
          # Inject Modul Kernel ke Rootfs
          # Asumsi di dalam kernel.tar.gz ada folder 'lib/modules'
          if [ -d "kernel_tmp/lib/modules" ]; then
            sudo cp -r kernel_tmp/lib/modules/* build/rootfs_data/lib/modules/
          fi
          
          # Siapkan folder Boot (EFI)
          # Salin kernel (Image/vmlinuz) dan DTB S905X (HG680-FJ)
          sudo cp kernel_tmp/boot/vmlinuz-* build/boot/vmlinuz
          sudo cp kernel_tmp/boot/uEnv.txt build/boot/uEnv.txt || true
          
          # Salin DTB spesifik HG680-FJ (Meson GXL S905X P212)
          mkdir -p build/boot/dtb/amlogic
          sudo cp kernel_tmp/boot/dtb/amlogic/meson-gxl-s905x-p212.dtb build/boot/dtb/amlogic/

      - name: Package to IMG
        run: |
          echo "Proses pembuatan .img menggunakan skrip pemaket..."
          # Catatan: Untuk membuat file .img yang bootable di STB, 
          # Anda butuh skrip tambahan seperti 'mk_s905x.sh'.
          # Tanpa skrip itu, Anda hanya mendapatkan rootfs yang sudah dipatch.

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-HG680FJ-Injected
          path: build/rootfs_data/
