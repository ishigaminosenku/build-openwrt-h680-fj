name: Build OpenWrt via Image Builder

on:
  workflow_dispatch:

env:
  # Link Image Builder untuk armsr/armv8
  IB_URL: https://downloads.openwrt.org/releases/25.12.2/targets/armsr/armv8/openwrt-imagebuilder-25.12.2-armsr-armv8.Linux-x86_64.tar.zst
  # Link Kernel Custom dari Ophub
  KERNEL_URL: https://github.com/ophub/kernel/releases/download/kernel_stable/6.18.23.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip zstd

      - name: Download and Extract Image Builder
        run: |
          wget ${{ env.IB_URL }}
          tar -I zstd -xvf openwrt-imagebuilder-*.tar.zst
          mv openwrt-imagebuilder-* ib

      - name: Download Custom Kernel
        run: |
          mkdir -p kernel-custom
          curl -L ${{ env.KERNEL_URL }} -o kernel-custom/kernel.tar.gz
          tar -xzvf kernel-custom/kernel.tar.gz -C kernel-custom/

      - name: Build Image
        run: |
          cd ib
          # Menentukan paket apa saja yang ingin dimasukkan
          # Tambahkan paket seperti luci, kmod-usb-net, dll.
          make image PROFILE="generic" PACKAGES="luci luci-proto-3g luci-proto-qmi luci-app-cpufreq kmod-usb-net-rtl8152"
          
      - name: Patch Kernel (Manual Injection)
        run: |
          # Langkah ini menyisipkan kernel 6.18.23 ke dalam hasil build
          # Biasanya dilakukan dengan mengganti file Image dan folder modules
          # di dalam folder build_dir milik Image Builder sebelum finalisasi .img
          echo "Injecting kernel 6.18.23 into the image..."
          # [Proses pemaketan .img kustom di sini]

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-HG680FJ-Custom
          path: ib/bin/targets/armsr/armv8/*.img.gz
