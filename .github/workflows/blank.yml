name: Build OpenWrt HG680-FJ (Flashable Image)

on:
  workflow_dispatch:

env:
  IB_URL: https://downloads.openwrt.org/releases/25.12.2/targets/armsr/armv8/openwrt-imagebuilder-25.12.2-armsr-armv8.Linux-x86_64.tar.zst
  KERNEL_URL: https://github.com/ophub/kernel/releases/download/kernel_stable/6.18.23.tar.gz
  # Tambahkan paket esensial untuk STB
  PACKAGES: "luci luci-app-openclash luci-app-vssr kmod-usb-net-asix-ax88179 kmod-usb-storage kmod-fs-ext4 kmod-amlogic-fdu kmod-usb-net-rtl8152"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential zstd wget rsync gawk gettext libssl-dev qemu-utils

      - name: Prepare Image Builder
        run: |
          wget $IB_URL -O ib.tar.zst
          mkdir ib && tar -I zstd -xvf ib.tar.zst -C ib --strip-components=1

      - name: Integrate Ophub Kernel
        run: |
          wget $KERNEL_URL -O kernel.tar.gz
          mkdir kernel_data && tar -xvf kernel.tar.gz -C kernel_data
          # Memindahkan Kernel Image dan DTB ke folder boot Image Builder
          cp -rf kernel_data/boot/* ib/target/linux/armsr/base-files/boot/
          # Memindahkan modul kernel agar kmod bisa diload
          mkdir -p ib/target/linux/armsr/base-files/lib/modules/6.18.23
          cp -rf kernel_data/lib/modules/* ib/target/linux/armsr/base-files/lib/modules/

      - name: Build Flashable Image
        run: |
          cd ib
          # Membuat folder files jika kamu ingin menyisipkan config manual
          mkdir -p files/etc/config
          
          make image PROFILE="generic" PACKAGES="$PACKAGES" FILES="files"
          
          # Mengubah output menjadi format .img jika diperlukan
          # (Biasanya IB armsr menghasilkan file .img.gz secara default)

      - name: Organize Artifacts
        run: |
          mkdir output
          cp ib/bin/targets/armsr/armv8/*.img.gz output/
          cd output && gunzip *.img.gz # Ekstrak agar BalenaEtcher bisa langsung pakai .img

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_HG680FJ_Flashable
          path: output/*.img
